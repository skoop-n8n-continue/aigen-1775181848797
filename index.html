<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Hotel In-Room Display</title>
    <link rel="stylesheet" href="styles.css?v=hotel777">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay" id="background-overlay"></div>
    <div class="app-container">
        <!-- Sidebar Navigation (Visual Only for Signage) -->
        <nav class="sidebar">
            <div class="hotel-logo">
                <span class="logo-text" id="hotel-logo-text">GRAND<br>LUMIÈRE</span>
            </div>
            <div class="nav-items" id="nav-items">
                <!-- Nav items will be injected here -->
            </div>
            <div class="sidebar-footer">
                <div id="current-time">12:00 PM</div>
                <div id="current-date">Friday, April 3</div>
            </div>
        </nav>

        <main class="main-content">
            <!-- Header Section -->
            <header class="welcome-section">
                <h1 class="welcome-text">Welcome, <span id="guest-name">...</span></h1>
                <div class="weather-widget">
                    <span id="weather-temp">--°F</span>
                    <span id="weather-desc">Loading...</span>
                    <span class="weather-location" id="weather-location">...</span>
                </div>
            </header>

            <!-- Dynamic Content Grid -->
            <div class="content-grid">
                <!-- TV Guide / Now Playing -->
                <section class="grid-card tv-guide">
                    <h3 id="tv-guide-title">TV Guide</h3>
                    <div class="tv-list" id="tv-list">
                        <!-- TV items will be injected here -->
                    </div>
                </section>

                <!-- Local Attractions -->
                <section class="grid-card attractions">
                    <h3 id="attraction-title">Local Attractions</h3>
                    <div class="attraction-card">
                        <img src="" alt="Attraction" id="attraction-img">
                        <div class="card-info">
                            <h4 id="attraction-name">...</h4>
                            <p id="attraction-desc">...</p>
                        </div>
                    </div>
                </section>

                <!-- Best Restaurants -->
                <section class="grid-card restaurants">
                    <h3 id="restaurant-title">Nearby Dining</h3>
                    <div class="restaurant-card">
                        <img src="" alt="Restaurant" id="restaurant-img">
                        <div class="card-info">
                            <h4 id="restaurant-name">...</h4>
                            <p id="restaurant-desc">...</p>
                        </div>
                    </div>
                </section>

                <!-- Room Service CTA -->
                <section class="grid-card room-service">
                    <div class="cta-banner">
                        <img src="" alt="Room Service" id="room-service-img">
                        <div class="cta-overlay">
                            <h3 id="room-service-title">Room Service</h3>
                            <p id="room-service-desc">...</p>
                            <button class="cta-button" id="room-service-button">...</button>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js?v=hotel777"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
